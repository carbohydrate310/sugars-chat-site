<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ホーム - Chat App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .home-container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; }
        .menu-bar { display: flex; justify-content: space-around; padding: 15px; background: #f8f8f8; border-bottom: 1px solid #ddd; }
        .friend-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; }
        .friend-item:hover { background: #f9f9f9; }
        .avatar { width: 40px; height: 40px; background: #ccc; border-radius: 50%; margin-right: 15px; }

/* home.html 用の追加スタイル */
.user-item {
    display: flex;
    align-items: center;
    padding: 15px;
    background: white;
    border-bottom: 1px solid #eee;
    transition: background 0.2s;
}

.user-item:active {
    background: #e9e9e9; /* タップした瞬間に色が変わる（フィードバック） */
}

.user-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 15px;
}

.user-info {
    flex: 1;
}

.user-name {
    font-weight: bold;
    font-size: 16px;
}
    </style>
</head>
<body>
    <div class="home-container">
        <header style="background:#075e54; color:white; padding:15px; text-align:center;">
            <h2 id="my-name">My Home</h2>
        </header>

        <div class="menu-bar">
            <button onclick="location.href='friend.html'">友達追加</button>
            <button onclick="location.href='bbs.html'">全員の掲示板</button>
            <button id="btn-logout">ログアウト</button>
        </div>

        <div style="padding:10px; color:#666; font-size:14px; background:#f0f0f0;">友達リスト</div>
        <div id="friend-list">
            </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
    if (!user) {
        location.href = "index.html";
    } else {
        // --- ここから追加：Googleログイン勢のための救済処置 ---
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
            // usersコレクションにデータがなければ作成する
            await setDoc(userRef, {
                name: user.displayName || "名無しユーザー",
                email: user.email,
                uid: user.uid,
                createdAt: serverTimestamp()
            });
            console.log("新規ユーザーデータをFirestoreに作成しました");
        }
        // --- ここまで追加 ---

        // 既存のユーザーリスト読み込みなどの処理...
        loadUserList(user.uid);
    }
});

        document.getElementById("btn-logout").onclick = () => signOut(auth);

        async function loadFriends(myId) {
            const listDiv = document.getElementById("friend-list");
            const snapshot = await getDocs(collection(db, "users", myId, "friends"));
            
            if (snapshot.empty) {
                listDiv.innerHTML = "<p style='padding:20px; text-align:center;'>友達を検索して追加してみよう！</p>";
                return;
            }

            for (const fDoc of snapshot.docs) {
                const uSnap = await getDoc(doc(db, "users", fDoc.id));
                if (uSnap.exists()) {
                    const data = uSnap.data();
                    const div = document.createElement("div");
                    div.className = "friend-item";
                    div.innerHTML = `<div class="avatar"></div><span>${data.name || data.email}</span>`;
                    // クリックで個別チャットへ（相手のIDをURLにのせる）
                    div.onclick = () => location.href = `chat.html?id=${fDoc.id}`;
                    listDiv.appendChild(div);
                }
            }
        }
    </script>
</body>
</html>
