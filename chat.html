<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>チャット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button onclick="location.href='home.html'">←</button>
        <span id="friend-name">チャット</span>
    </header>
    <div id="message-list" style="height:400px; overflow-y:auto; background:#7494c0; padding:10px;"></div>
    <div style="padding:10px;">
        <input type="text" id="msg-input">
        <button id="btn-send">送信</button>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const friendId = params.get("id");

        onAuthStateChanged(auth, async (user) => {
            if (!user) location.href = "index.html";
            if (friendId) {
                const snap = await getDoc(doc(db, "users", friendId));
                if (snap.exists()) document.getElementById("friend-name").innerText = snap.data().name || "相手";
                loadMsgs(user.uid, friendId);
            }
        });

        async function send() {
            const input = document.getElementById("msg-input");
            if (input.value.trim()) {
                await addDoc(collection(db, "direct_messages"), {
                    text: input.value,
                    senderId: auth.currentUser.uid,
                    receiverId: friendId,
                    members: [auth.currentUser.uid, friendId].sort(),
                    createdAt: serverTimestamp(),
                    read: false
                });
                input.value = "";
            }
        }
        document.getElementById("btn-send").onclick = send;

        function loadMsgs(myId, friendId) {
            const q = query(collection(db, "direct_messages"), where("members", "==", [myId, friendId].sort()), orderBy("createdAt"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("message-list");
                list.innerHTML = "";
                snapshot.forEach(mDoc => {
                    const d = mDoc.data();
                    if (!d.createdAt) return;

                    // 既読にする
                    if (d.senderId === friendId && !d.read) {
                        updateDoc(doc(db, "direct_messages", mDoc.id), { read: true });
                    }

                    const div = document.createElement("div");
                    const isMe = d.senderId === myId;
                    div.style = isMe ? "text-align:right; margin:5px;" : "text-align:left; margin:5px;";
                    div.innerHTML = `<div style="display:inline-block; padding:10px; border-radius:10px; background:${isMe?'#dcf8c6':'white'};">
                        ${d.text} <br> <small style="font-size:10px; color:gray;">${isMe && d.read ? '既読' : ''}</small>
                    </div>`;
                    list.appendChild(div);
                });
                list.scrollTop = list.scrollHeight;
            });
        }
    </script>
</body>
</html>
