<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #message-list { height: 450px; overflow-y: auto; background: #7494c0; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; flex-direction: column; max-width: 80%; }
        .msg-me-row { align-self: flex-end; }
        .msg-friend-row { align-self: flex-start; }
        .msg-bubble { padding: 10px; border-radius: 10px; position: relative; font-size: 15px; }
        .msg-me { background: #dcf8c6; }
        .msg-friend { background: white; }
        .msg-info { font-size: 10px; color: #555; margin-top: 2px; display: flex; gap: 5px; align-items: center; }
        /* 削除ボタンの見た目 */
        .btn-delete {
            background: none; border: none; color: #ff4d4d; cursor: pointer; 
            font-size: 12px; padding: 0 5px; opacity: 0.6;
        }
        .btn-delete:hover { opacity: 1; }
        .input-area { padding: 10px; display: flex; gap: 5px; background: white; }
        #msg-input { flex: 1; }
    </style>
</head>
<body>
    <header>
        <button onclick="location.href='home.html'">←</button>
        <span id="friend-name">チャット</span>
    </header>

    <div id="message-list"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="メッセージを入力...">
        <button id="btn-send">送信</button>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, where, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const friendId = params.get("id");

        onAuthStateChanged(auth, async (user) => {
            if (!user) location.href = "index.html";
            if (friendId) {
                const snap = await getDoc(doc(db, "users", friendId));
                if (snap.exists()) document.getElementById("friend-name").innerText = snap.data().name || "相手";
                loadMsgs(user.uid, friendId);
            }
        });

        // 送信機能
        async function send() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (text && auth.currentUser) {
                await addDoc(collection(db, "direct_messages"), {
                    text: text,
                    senderId: auth.currentUser.uid,
                    receiverId: friendId,
                    members: [auth.currentUser.uid, friendId].sort(),
                    createdAt: serverTimestamp(),
                    read: false
                });
                input.value = "";
            }
        }
        document.getElementById("btn-send").onclick = send;

        // 削除機能の関数
        window.deleteMessage = async (msgId) => {
            if (confirm("このメッセージを削除しますか？")) {
                try {
                    await deleteDoc(doc(db, "direct_messages", msgId));
                } catch (e) {
                    alert("削除に失敗しました: " + e.message);
                }
            }
        };

        // メッセージ読み込み
        function loadMsgs(myId, friendId) {
            const q = query(collection(db, "direct_messages"), where("members", "==", [myId, friendId].sort()), orderBy("createdAt"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("message-list");
                list.innerHTML = "";
                snapshot.forEach(mDoc => {
                    const d = mDoc.data();
                    if (!d.createdAt) return;

                    // 既読更新
                    if (d.senderId === friendId && !d.read) {
                        updateDoc(doc(db, "direct_messages", mDoc.id), { read: true });
                    }

                    const isMe = d.senderId === myId;
                    const date = d.createdAt.toDate();
                    const time = `${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;

                    const row = document.createElement("div");
                    row.className = `msg-row ${isMe ? 'msg-me-row' : 'msg-friend-row'}`;
                    
                    // 自分が送ったメッセージの時だけ削除ボタンを表示
                    const deleteBtn = isMe ? `<button class="btn-delete" onclick="deleteMessage('${mDoc.id}')">削除</button>` : "";

                    row.innerHTML = `
                        <div class="msg-bubble ${isMe ? 'msg-me' : 'msg-friend'}">${d.text}</div>
                        <div class="msg-info">
                            ${isMe && d.read ? '<span>既読</span>' : ''}
                            <span>${time}</span>
                            ${deleteBtn}
                        </div>
                    `;
                    list.appendChild(row);
                });
                list.scrollTop = list.scrollHeight;
            });
        }
    </script>
</body>
</html>
