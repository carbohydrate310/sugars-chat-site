<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Main Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #chat-container { max-width: 600px; margin: 0 auto; background: white; height: 100vh; display: flex; flex-direction: column; }
        #message-list { flex-grow: 1; overflow-y: auto; padding: 20px; background: #f0f0f0; }
        .input-area { padding: 15px; display: flex; border-top: 1px solid #ddd; }
        #msg-input { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header style="background:#075e54; color:white; padding:15px; display:flex; justify-content:space-between;">
            <span id="user-name">読み込み中...</span>
            <div>
                <button onclick="location.href='friend.html'" style="background:orange; color:white; font-size:12px;">友達追加</button>
                <button id="btn-logout" style="background:#dc3545; color:white; font-size:12px;">ログアウト</button>
            </div>
        </header>
        <div id="message-list"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="メッセージ...">
            <button id="btn-send" style="background:#075e54; color:white; margin-left:10px;">送信</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                document.getElementById("user-name").innerText = user.displayName || user.email;
                loadMessages(user);
            }
        });

        document.getElementById("btn-logout").onclick = () => signOut(auth);

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            if (input.value.trim() && auth.currentUser) {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    userName: auth.currentUser.displayName || auth.currentUser.email,
                    uid: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            }
        }

        document.getElementById("btn-send").onclick = sendMessage;

        function loadMessages(currentUser) {
            const q = query(collection(db, "messages"), orderBy("createdAt"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("message-list");
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement("div");
                    div.style.textAlign = data.uid === currentUser.uid ? "right" : "left";
                    div.innerHTML = `<p style="font-size:10px; margin:0;">${data.userName}</p>
                                     <span style="display:inline-block; background:${data.uid === currentUser.uid ? '#dcf8c6' : 'white'}; padding:8px; border-radius:10px; margin-bottom:10px;">${data.text}</span>`;
                    list.appendChild(div);
                });
                list.scrollTop = list.scrollHeight;
            });
        }
    </script>
</body>
</html>
