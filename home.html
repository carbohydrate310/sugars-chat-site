<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム - Chat App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .user-item { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-name { font-weight: bold; flex-grow: 1; }
        .btn-bbs-go { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; text-decoration: none; display: block; margin: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <span style="font-weight:bold;">友達リスト</span>
            <button id="btn-logout" style="background:none; margin-left:auto; color:white; font-size:12px;">ログアウト</button>
        </header>
        
        <a href="bbs.html" class="btn-bbs-go">全体掲示板へ行く</a>

        <div id="user-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                location.href = "index.html";
            } else {
                // --- 重要：Googleログイン勢のデータをFirestoreに自動作成 ---
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName || user.email.split('@')[0],
                        email: user.email,
                        uid: user.uid,
                        createdAt: serverTimestamp()
                    });
                }
                // ユーザー一覧を表示
                loadUsers(user.uid);
            }
        });

        function loadUsers(myId) {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById("user-list");
                list.innerHTML = "";
                snapshot.forEach(uDoc => {
                    const userData = uDoc.data();
                    if (userData.uid === myId) return; // 自分は出さない

                    const div = document.createElement("div");
                    div.className = "user-item";
                    div.innerHTML = `<span class="user-name">${userData.name || userData.email}</span><span>＞</span>`;
                    div.onclick = () => { location.href = `chat.html?id=${userData.uid}`; };
                    list.appendChild(div);
                });
            });
        }

        document.getElementById("btn-logout").onclick = () => signOut(auth);
    </script>
</body>
</html>
