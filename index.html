<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" style="justify-content: center; padding: 20px; gap: 20px;">
        <h1 style="text-align: center; color: #075e54;">Chat App</h1>
        <button id="btn-login" style="height: 60px; font-weight: bold; font-size: 18px;">Googleでログイン</button>
    </div>
    <script type="module">
        import { auth } from "./firebase-config.js";
        import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        onAuthStateChanged(auth, (user) => { if (user) location.href = "home.html"; });

        document.getElementById("btn-login").onclick = async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); }
            catch (e) { alert("ログイン失敗: " + e.message); }
        };
    </script>
</body>
</html>
