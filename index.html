<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1>Chat App</h1>
        <button id="btn-login" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">Googleでログイン</button>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // すでにログイン済みならホームへ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // ログイン状態が確認できたら自動で移動
                setTimeout(() => { location.href = "home.html"; }, 500);
            }
        });

        document.getElementById("btn-login").onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // --- ここが重要：Googleログイン直後にデータベースにユーザーを登録する ---
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // 初めてログインした人なら、Firestoreにデータを保存
                    await setDoc(userRef, {
                        name: user.displayName || user.email,
                        email: user.email,
                        uid: user.uid,
                        createdAt: serverTimestamp()
                    });
                    console.log("新規ユーザー情報を登録しました");
                }
                
                location.href = "home.html";
            } catch (error) {
                console.error("ログインエラー:", error);
                alert("ログインに失敗しました");
            }
        };
    </script>
</body>
</html>
