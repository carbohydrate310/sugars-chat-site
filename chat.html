<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個別チャット - Chat App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100dvh; /* スマホのツールバーを除いた高さ(Dynamic VH) */
            width: 100%;
            background-color: #7494c0;
        }

        header {
            height: 60px;
            background: #075e54;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #message-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* スムーズなスクロール */
            -webkit-overflow-scrolling: touch;
        }

        /* 吹き出しの幅をスマホに最適化 */
        .msg-row { max-width: 85%; }

        .input-area {
            background: #f0f0f0;
            padding: 8px 12px;
            padding-bottom: env(safe-area-inset-bottom); /* iPhoneの下の棒対策 */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #msg-input {
            flex: 1;
            border-radius: 20px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            background: white;
        }

        #btn-send {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #075e54;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #chat-container { max-width: 600px; margin: 0 auto; position: relative; }
        .back-btn { background: none; color: white; border: none; font-size: 24px; cursor: pointer; margin-right: 15px; }

        #message-list { background-color: #7494c0 !important; }

        /* 日付セパレーター */
        .date-separator {
            align-self: center; background: rgba(0,0,0,0.2); color: white;
            padding: 4px 12px; border-radius: 12px; font-size: 11px; margin: 10px 0;
        }

        .msg-row { display: flex; flex-direction: column; }
        .msg-me-row { align-self: flex-end; align-items: flex-end; }
        .msg-friend-row { align-self: flex-start; align-items: flex-start; }

        .msg { padding: 8px 14px; border-radius: 12px; word-wrap: break-word; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-me { background: #dcf8c6; border-top-right-radius: 2px; }
        .msg-friend { background: white; border-top-left-radius: 2px; }

        /* 時間と既読のコンテナ */
        .msg-info { display: flex; gap: 5px; align-items: flex-end; margin-top: 2px; }
        .msg-time { font-size: 10px; color: #eee; }
        .msg-me-row .msg-time { color: #4a6741; }
        
        .read-status { font-size: 10px; color: #4a6741; font-weight: bold; }

        .input-area { border-top: 1px solid #ddd; }
        #msg-input { outline: none; }
        #btn-send { border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container">
        <header>
            <button onclick="location.href='home.html'" class="back-btn">←</button>
            <span id="friend-name" style="font-weight: bold;">読み込み中...</span>
        </header>
        <div id="message-list"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="メッセージを入力..." autocomplete="off">
            <button id="btn-send">送</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const friendId = params.get("id");

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                const friendSnap = await getDoc(doc(db, "users", friendId));
                if (friendSnap.exists()) {
                    document.getElementById("friend-name").innerText = friendSnap.data().name || friendSnap.data().email;
                }
                loadDirectMessages(user.uid, friendId);
            }
        });

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (text && auth.currentUser) {
                try {
                    await addDoc(collection(db, "direct_messages"), {
                        text: text,
                        senderId: auth.currentUser.uid,
                        receiverId: friendId,
                        members: [auth.currentUser.uid, friendId].sort(),
                        createdAt: serverTimestamp(),
                        read: false
                    });
                    input.value = "";
                } catch (e) { console.error(e); }
            }
        }

        document.getElementById("btn-send").onclick = sendMessage;
        document.getElementById("msg-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function loadDirectMessages(myId, friendId) {
            const pair = [myId, friendId].sort();
            const q = query(
                collection(db, "direct_messages"),
                where("members", "==", pair),
                orderBy("createdAt")
            );

            let lastDateStr = "";

            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("message-list");
                list.innerHTML = "";
                lastDateStr = "";

                const batch = writeBatch(db);
                let hasUnread = false;

                snapshot.forEach(msgDoc => {
                    const data = msgDoc.data();
                    if (!data.createdAt) return;

                    const date = data.createdAt.toDate();
                    
                    // --- 日付セパレーター ---
                    const dateStr = `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()}`;
                    if (dateStr !== lastDateStr) {
                        const dateDiv = document.createElement("div");
                        dateDiv.className = "date-separator";
                        dateDiv.innerText = dateStr;
                        list.appendChild(dateDiv);
                        lastDateStr = dateStr;
                    }

                    // --- 既読更新 (相手からの未読を既読にする) ---
                    if (data.senderId === friendId && data.read === false) {
                        batch.update(doc(db, "direct_messages", msgDoc.id), { read: true });
                        hasUnread = true;
                    }

                    const timeStr = date.getHours().toString().padStart(2, '0') + ":" + 
                                    date.getMinutes().toString().padStart(2, '0');

                    const isMe = data.senderId === myId;
                    // 以降のメッセージ描画処理は元のコードに準拠...
