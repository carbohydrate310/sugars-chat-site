<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span>友達リスト</span>
        <a href="bbs.html" style="margin-left:auto; color:white;">掲示板</a>
    </header>
    <div id="user-list"></div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                location.href = "index.html";
            } else {
                // Googleログイン等でDBにデータがない場合、最小限の情報を自動作成
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName || user.email,
                        uid: user.uid,
                        createdAt: serverTimestamp()
                    });
                }
                loadUsers(user.uid);
            }
        });

        function loadUsers(myId) {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById("user-list");
                list.innerHTML = "";
                snapshot.forEach(uDoc => {
                    const data = uDoc.data();
                    if (data.uid === myId) return;
                    const div = document.createElement("div");
                    div.style = "padding:15px; border-bottom:1px solid #ccc; background:white; cursor:pointer;";
                    div.innerText = data.name || data.email;
                    div.onclick = () => location.href = `chat.html?id=${data.uid}`;
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
