<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Realtime Chat App</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .auth-container { display: flex; justify-content: center; align-items: center; flex-grow: 1; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .card h1 { color: #075e54; margin-bottom: 20px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #chat-ui { display: flex; flex-direction: column; height: 100vh; max-width: 700px; margin: 0 auto; width: 100%; background: #efe7dd; position: relative; }
        header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        #message-list { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; background: white; box-shadow: 0 1px 1px rgba(0,0,0,0.1); width: fit-content; max-width: 80%; word-wrap: break-word; position: relative; font-size: 15px; }
        .msg-me { background: #dcf8c6; align-self: flex-end; }
        .user-name { font-size: 11px; color: #666; display: block; margin-bottom: 4px; font-weight: bold; }
        .input-area { padding: 10px; display: flex; background: #f0f0f0; border-top: 1px solid #ddd; align-items: center; }
        #msg-input { flex-grow: 1; padding: 12px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-google { background: white; color: #555; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-logout { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; }
        #btn-send { background: #075e54; color: white; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; display: flex; align-items: center; justify-content: center; padding: 0; }
        .hidden { display: none !important; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="auth-ui" class="auth-container">
        <div class="card">
            <h1>Chat App</h1>
            <input type="email" id="email" placeholder="メールアドレス">
            <input type="password" id="password" placeholder="パスワード(6文字以上)">
            <button id="btn-login" class="btn-success" style="width: 100%; margin-top: 10px;">ログイン</button>
            <button id="btn-signup" class="btn-primary" style="width: 100%; margin-top: 10px;">新規アカウント登録</button>
            <hr>
            <button id="btn-google" class="btn-google" style="width: 100%;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Googleでログイン
            </button>
        </div>
    </div>

    <div id="chat-ui" class="hidden">
        <header>
            <span id="user-display">読み込み中...</span>
            <button id="btn-logout" class="btn-logout">ログアウト</button>
        </header>
        <div id="message-list"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="メッセージを入力...">
            <button id="btn-send">送信</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- GitHub公開用に情報を伏せ字にしています ---
        const firebaseConfig = {
            apiKey: "???????????????????????????????????????",
            authDomain: "???????????????????????????????????????",
            projectId: "???????????????",
            storageBucket: "???????????????????????????????????????",
            messagingSenderId: "????????????",
            appId: "???????????????????????????????????????",
            measurementId: "???????????"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById("btn-google").onclick = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
        document.getElementById("btn-signup").onclick = () => {
            const e = document.getElementById("email").value.trim();
            const p = document.getElementById("password").value;
            if(!e || !p) return alert("入力してください");
            createUserWithEmailAndPassword(auth, e, p).catch(err => alert("登録エラー: " + err.message));
        };
        document.getElementById("btn-login").onclick = () => {
            const e = document.getElementById("email").value.trim();
            const p = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, e, p).catch(err => alert("ログインエラー: " + err.message));
        };
        document.getElementById("btn-logout").onclick = () => signOut(auth);

        const sendMsg = async () => {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (text && auth.currentUser) {
                try {
                    await addDoc(collection(db, "messages"), {
                        text: text,
                        userName: auth.currentUser.displayName || auth.currentUser.email,
                        uid: auth.currentUser.uid,
                        createdAt: serverTimestamp()
                    });
                    input.value = "";
                } catch (e) {
                    alert("送信に失敗しました。");
                }
            }
        };

        document.getElementById("btn-send").onclick = sendMsg;
        document.getElementById("msg-input").onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

        let unsubscribe = null;
        onAuthStateChanged(auth, (user) => {
            const authUI = document.getElementById("auth-ui");
            const chatUI = document.getElementById("chat-ui");
            if (user) {
                authUI.classList.add("hidden");
                chatUI.classList.remove("hidden");
                document.getElementById("user-display").innerText = "👤 " + (user.displayName || user.email.split('@')[0]);
                const q = query(collection(db, "messages"), orderBy("createdAt"));
                unsubscribe = onSnapshot(q, (snapshot) => {
                    const list = document.getElementById("message-list");
                    list.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        if (!data.createdAt) return;
                        const div = document.createElement("div");
                        div.className = `msg ${data.uid === user.uid ? 'msg-me' : ''}`;
                        div.innerHTML = `<span class="user-name">${data.userName}</span>${data.text}`;
                        list.appendChild(div);
                    });
                    list.scrollTop = list.scrollHeight;
                });
            } else {
                authUI.classList.remove("hidden");
                chatUI.classList.add("hidden");
                if (unsubscribe) unsubscribe();
            }
        });
    </script>
</body>
</html>
