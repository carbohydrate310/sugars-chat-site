<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .user-item { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-name { font-weight: bold; flex-grow: 1; }
        .online-status { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; background: #ccc; transition: background 0.3s; }
        .online-active { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .status-text { font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #075e54; color: white;">
        <span style="font-weight:bold;">友達リスト</span>
        <button id="btn-logout" style="background:none; color:white; border:1px solid white; padding:5px 10px; border-radius:5px; font-size:12px;">ログアウト</button>
    </header>
    
    <div id="user-list"></div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, doc, updateDoc, onSnapshot, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                location.href = "index.html";
            } else {
                // 自分のデータがあるか確認（Googleログイン対策）
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    await setDoc(userRef, { name: user.displayName || user.email, uid: user.uid });
                }

                // 生存報告（ハートビート）ループ
                const heartbeat = () => {
                    updateDoc(userRef, { lastActive: serverTimestamp() }).catch(() => {});
                };
                heartbeat(); // 初回
                setInterval(heartbeat, 5000); // 5秒ごとに更新

                loadUsers(user.uid);
            }
        });

        function loadUsers(myId) {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const list = document.getElementById("user-list");
                list.innerHTML = "";
                const now = Date.now();

                snapshot.forEach(uDoc => {
                    const data = uDoc.data();
                    if (data.uid === myId) return;

                    // 10秒以内ならオンラインと判定
                    let isOnline = false;
                    if (data.lastActive) {
                        const lastActiveTime = data.lastActive.toDate().getTime();
                        if (now - lastActiveTime < 10000) isOnline = true;
                    }

                    const div = document.createElement("div");
                    div.className = "user-item";
                    div.onclick = () => location.href = `chat.html?id=${data.uid}`;
                    div.innerHTML = `
                        <div class="online-status ${isOnline ? 'online-active' : ''}"></div>
                        <span class="user-name">${data.name || data.email}</span>
                        <span class="status-text" style="color:${isOnline ? '#4caf50' : '#999'}">
                            ${isOnline ? 'オンライン' : 'オフライン'}
                        </span>
                    `;
                    list.appendChild(div);
                });
            });
        }

        document.getElementById("btn-logout").onclick = () => signOut(auth);
    </script>
</body>
</html>
