<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #message-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #7494c0; }
        .msg-row { display: flex; flex-direction: column; max-width: 85%; }
        .msg-me-row { align-self: flex-end; align-items: flex-end; }
        .msg-friend-row { align-self: flex-start; align-items: flex-start; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg-me { background: #dcf8c6; border-top-right-radius: 2px; }
        .msg-friend { background: white; border-top-left-radius: 2px; }
        .msg-info { display: flex; gap: 5px; align-items: flex-end; margin-top: 2px; }
        .msg-time { font-size: 10px; color: #eee; }
        .msg-me-row .msg-time { color: #4a6741; }
        .read-status { font-size: 10px; color: #4a6741; font-weight: bold; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 8px; align-items: center; }
        #msg-input { flex: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px 15px; }
        #btn-send { width: 45px; height: 45px; border-radius: 50%; background: #075e54; color: white; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <button onclick="location.href='home.html'" style="background:none; color:white; font-size:24px; margin-right:15px;">←</button>
            <span id="friend-name" style="font-weight:bold;">読み込み中...</span>
        </header>
        <div id="message-list"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="メッセージ..." autocomplete="off">
            <button id="btn-send">送</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const friendId = params.get("id");

        onAuthStateChanged(auth, async (user) => {
            if (!user) { location.href = "index.html"; }
            else {
                const fSnap = await getDoc(doc(db, "users", friendId));
                if (fSnap.exists()) document.getElementById("friend-name").innerText = fSnap.data().name || fSnap.data().email;
                loadDirectMessages(user.uid, friendId);
            }
        });

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (text && auth.currentUser) {
                await addDoc(collection(db, "direct_messages"), {
                    text: text, senderId: auth.currentUser.uid, receiverId: friendId,
                    members: [auth.currentUser.uid, friendId].sort(), createdAt: serverTimestamp(), read: false
                });
                input.value = "";
            }
        }
        document.getElementById("btn-send").onclick = sendMessage;
        document.getElementById("msg-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function loadDirectMessages(myId, friendId) {
            const q = query(collection(db, "direct_messages"), where("members", "==", [myId, friendId].sort()), orderBy("createdAt"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("message-list");
                list.innerHTML = "";
                const batch = writeBatch(db);
                let hasUnread = false;

                snapshot.forEach(msgDoc => {
                    const data = msgDoc.data();
                    if (!data.createdAt) return;
                    const date = data.createdAt.toDate();
                    const timeStr = `${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;

                    if (data.senderId === friendId && !data.read) {
                        batch.update(doc(db, "direct_messages", msgDoc.id), { read: true });
                        hasUnread = true;
                    }

                    const isMe = data.senderId === myId;
                    const row = document.createElement("div");
                    row.className = `msg-row ${isMe ? 'msg-me-row' : 'msg-friend-row'}`;
                    row.innerHTML = `
                        <div class="msg ${isMe ? 'msg-me' : 'msg-friend'}">${data.text}</div>
                        <div class="msg-info">
                            ${isMe && data.read ? '<span class="read-status">既読</span>' : ''}
                            <span class="msg-time">${timeStr}</span>
                        </div>
                    `;
                    list.appendChild(row);
                });
                if (hasUnread) batch.commit();
                list.scrollTop = list.scrollHeight;
            });
        }
    </script>
</body>
</html>
