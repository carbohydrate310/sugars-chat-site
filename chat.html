<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #message-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #7494c0; }
        .msg-row { display: flex; flex-direction: column; max-width: 85%; }
        .msg-me-row { align-self: flex-end; align-items: flex-end; }
        .msg-friend-row { align-self: flex-start; align-items: flex-start; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .msg-me { background: #dcf8c6; border-top-right-radius: 2px; }
        .msg-friend { background: white; border-top-left-radius: 2px; }
        .msg-info { display: flex; gap: 5px; font-size: 10px; margin-top: 2px; color: #eee; }
        .msg-me-row .msg-info { color: #4a6741; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <button onclick="location.href='home.html'" style="background:none;">←</button>
            <span id="friend-name" style="margin-left:10px; font-weight:bold;">チャット</span>
        </header>
        <div id="message-list"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="メッセージ...">
            <button id="btn-send" style="width: 60px;">送</button>
        </div>
    </div>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const params = new URLSearchParams(window.location.search);
        const friendId = params.get("id");

        onAuthStateChanged(auth, async (user) => {
            if (!user) location.href = "index.html";
            else if (friendId) {
                const snap = await getDoc(doc(db, "users", friendId));
                if (snap.exists()) document.getElementById("friend-name").innerText = snap.data().name || snap.data().email;
                loadMsgs(user.uid, friendId);
            }
        });

        async function send() {
            const input = document.getElementById("msg-input");
            if (input.value.trim() && auth.currentUser) {
                await addDoc(collection(db, "direct_messages"), {
                    text: input.value.trim(), senderId: auth.currentUser.uid, receiverId: friendId,
                    members: [auth.currentUser.uid, friendId].sort(), createdAt: serverTimestamp(), read: false
                });
                input.value = "";
            }
        }
        document.getElementById("btn-send").onclick = send;
        document.getElementById("msg-input").onkeypress = (e) => { if(e.key === 'Enter') send(); };

        function loadMsgs(myId, friendId) {
            const q = query(collection(db, "direct_messages"), where("members", "==", [myId, friendId].sort()), orderBy("createdAt"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("message-list");
                list.innerHTML = "";
                const batch = writeBatch(db);
                snapshot.forEach(mDoc => {
                    const d = mDoc.data();
                    if (!d.createdAt) return;
                    if (d.senderId === friendId && !d.read) batch.update(doc(db, "direct_messages", mDoc.id), { read: true });
                    const isMe = d.senderId === myId;
                    const date = d.createdAt.toDate();
                    const time = `${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
                    const div = document.createElement("div");
                    div.className = `msg-row ${isMe ? 'msg-me-row' : 'msg-friend-row'}`;
                    div.innerHTML = `<div class="msg ${isMe ? 'msg-me' : 'msg-friend'}">${d.text}</div>
                        <div class="msg-info">${isMe && d.read ? '既読' : ''} <span>${time}</span></div>`;
                    list.appendChild(div);
                });
                batch.commit().catch(() => {});
                list.scrollTop = list.scrollHeight;
            });
        }
    </script>
</body>
</html>
