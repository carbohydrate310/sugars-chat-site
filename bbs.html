<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <button onclick="location.href='home.html'" style="background:none;">←</button>
            <span style="margin-left:10px; font-weight:bold;">掲示板</span>
        </header>
        <div id="bbs-list" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; background:#f0f0f2;"></div>
        <div class="input-area" style="display:flex; padding:10px; gap:8px; background:white;">
            <input type="text" id="bbs-input" placeholder="投稿内容...">
            <button id="btn-bbs" style="width:60px;">投稿</button>
        </div>
    </div>
    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => { if (!user) location.href = "index.html"; });

        async function post() {
            const input = document.getElementById("bbs-input");
            if (input.value.trim() && auth.currentUser) {
                await addDoc(collection(db, "board_messages"), {
                    text: input.value.trim(),
                    userName: auth.currentUser.displayName || auth.currentUser.email,
                    createdAt: serverTimestamp()
                });
                input.value = "";
            }
        }
        document.getElementById("btn-bbs").onclick = post;

        const q = query(collection(db, "board_messages"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById("bbs-list");
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                if (!d.createdAt) return;
                const date = d.createdAt.toDate();
                const time = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
                const div = document.createElement("div");
                div.style = "background:white; padding:10px; border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.1);";
                div.innerHTML = `<div style="font-size:12px; color:#666; display:flex; justify-content:space-between;">
                    <b>${d.userName}</b> <span>${time}</span></div>
                    <div style="margin-top:5px;">${d.text}</div>`;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
